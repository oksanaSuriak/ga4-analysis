<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg{fill:#f6f8fb}.card{fill:#fff;stroke:#e5e7eb}.title{font:700 30px Segoe UI,Arial;fill:#111827}.subtitle{font:400 15px Segoe UI,Arial;fill:#6b7280}.kpi-label{font:600 15px Segoe UI,Arial;fill:#6b7280}.kpi-value{font:800 42px Segoe UI,Arial;fill:#111827}.chart-title{font:700 20px Segoe UI,Arial;fill:#111827}.label{font:600 14px Segoe UI,Arial;fill:#374151}.value{font:600 13px Segoe UI,Arial;fill:#111827}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="48" y="58" class="title">GA4 Acquisition Dashboard</text>
